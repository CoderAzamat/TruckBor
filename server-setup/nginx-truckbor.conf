server {
    listen 80;
    server_name api.truckbor.uz truckbor.uz app.truckbor.uz admin.truckbor.uz;
    return 301 https://$host$request_uri;
}

# ── admin.truckbor.uz — Admin Panel ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.truckbor.uz;

    ssl_certificate     /etc/letsencrypt/live/api.truckbor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.truckbor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/truckbor/api/wwwroot/admin;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── app.truckbor.uz — Mini App ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.truckbor.uz;

    ssl_certificate     /etc/letsencrypt/live/api.truckbor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.truckbor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/truckbor/api/wwwroot/miniapp;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API calls from Mini App
    location /api/ {
        # CORS — always, even on 5xx errors
        add_header 'Access-Control-Allow-Origin'  '*'                                    always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS'      always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Telegram-Init-Data' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Telegram-Init-Data';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── api.truckbor.uz — API + Webhook ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.truckbor.uz;

    ssl_certificate     /etc/letsencrypt/live/api.truckbor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.truckbor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Static files
    location /miniapp {
        root /var/www/truckbor/api/wwwroot;
        try_files $uri $uri/ /miniapp/index.html;
    }

    location /admin {
        root /var/www/truckbor/api/wwwroot;
        try_files $uri $uri/ /admin/index.html;
    }

    location /uploads {
        root /var/www/truckbor/api/wwwroot;
    }

    # API + Webhook — CORS har doim (hatto 502 da ham)
    location / {
        add_header 'Access-Control-Allow-Origin'  '*'                               always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Telegram-Init-Data' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Telegram-Init-Data';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;

        # API ishlamayotgan bo'lsa aniq xato
        proxy_intercept_errors off;
    }
}
