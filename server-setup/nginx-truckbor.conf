server {
    listen 80;
    server_name api.truckbor.uz truckbor.uz app.truckbor.uz admin.truckbor.uz;
    return 301 https://$host$request_uri;
}

# ── admin.truckbor.uz — Admin Panel ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.truckbor.uz;

    ssl_certificate     /etc/letsencrypt/live/api.truckbor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.truckbor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/truckbor/api/wwwroot/admin;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── app.truckbor.uz — Mini App ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.truckbor.uz;

    ssl_certificate     /etc/letsencrypt/live/api.truckbor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.truckbor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/truckbor/api/wwwroot/miniapp;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API calls from Mini App
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── api.truckbor.uz — API + Webhook ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.truckbor.uz;

    ssl_certificate     /etc/letsencrypt/live/api.truckbor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.truckbor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Static files (Mini App fallback)
    location /miniapp {
        root /var/www/truckbor/api/wwwroot;
        try_files $uri $uri/ /miniapp/index.html;
    }

    # Admin panel static
    location /admin {
        root /var/www/truckbor/api/wwwroot;
        try_files $uri $uri/ /admin/index.html;
    }

    location /uploads {
        root /var/www/truckbor/api/wwwroot;
    }

    # API + Webhook
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
